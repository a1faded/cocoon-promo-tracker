name: Cocoon Promo Tracker

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Restore last promo
        uses: actions/cache@v3
        with:
          path: last_promo.txt
          key: promo-cache

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python tracker.py

      - name: Save last promo
        uses: actions/cache@v3
        with:
          path: last_promo.txt
          key: promo-cache
